<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - LaFina Bistro</title>
    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
                        url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .btn-success {
            background: #28a745;
            border: none;
            transition: all 0.3s;
        }
        .btn-success:hover {
            background: #218838;
            transform: translateY(-3px);
        }
        h2 {
            color: #28a745;
            font-weight: 700;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="card p-5">
                    <div class="text-center mb-4">
                        <h2>Welcome to LaFina Bistro</h2>
                        <p class="text-muted">Create your account to book tables & enjoy our menu</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}   <!-- This shows username, password1, password2 nicely -->

                        <button type="submit" class="btn btn-success btn-lg w-100 py-3 mt-3 fw-bold">
                            <i class="fas fa-user-plus"></i> Create My Account
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0">
                            Already have an account?
                            <a href="{% url 'login' %}" class="text-success fw-bold">Log in here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
